<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;}
.card {background:white;padding:35px;border-radius:15px;width:320px;text-align:center;}
input {width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #ccc;}
button {width:100%;padding:10px;background:#2575fc;color:white;border:none;border-radius:6px;}
a {display:block;margin-top:15px;}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<a href="/register">Create account</a>
</div>
</body>
</html>
