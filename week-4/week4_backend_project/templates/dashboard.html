<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {font-family:Arial;background:#f4f6f9;margin:0;}
.nav {background:#6a11cb;color:white;padding:15px;text-align:right;}
.nav a {color:white;margin-left:15px;text-decoration:none;}
.container {width:85%;margin:30px auto;background:white;
padding:30px;border-radius:15px;box-shadow:0 6px 20px rgba(0,0,0,0.1);}
table {width:100%;border-collapse:collapse;}
th {background:#6a11cb;color:white;}
th,td {padding:10px;text-align:center;}
tr:nth-child(even){background:#f2f2f2;}
.btn {padding:5px 10px;border-radius:6px;color:white;text-decoration:none;}
.edit {background:#2575fc;}
.delete {background:#ff416c;}
.add {background:#28a745;}
</style>
</head>
<body>

<div class="nav">
Welcome {{ user }} |
<a href="/logout">Logout</a>
</div>

<div class="container">
<h2>Student Management</h2>
<a href="/add" class="btn add">Add Student</a>

<table>
<tr>
<th>S.No</th>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Action</th>
</tr>

{% for student in students %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ student["name"] }}</td>
<td>{{ student["age"] }}</td>
<td>{{ student["course"] }}</td>
<td>
<a href="/edit/{{ student['id'] }}" class="btn edit">Edit</a>
<a href="/delete/{{ student['id'] }}" class="btn delete">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

</body>
</html>
